<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Library Management System - Books</title>

    <!-- Встроенные стили-гаранты (сработают в любом случае и воссоздадут ваш дизайн) -->
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: #f8f9fa; color: #6c757d; margin: 0; padding: 0; }
        .navbar { background-color: #ffffff; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #dee2e6; box-shadow: 0 2px 4px rgba(0,0,0,.04); }
        .navbar-brand { font-size: 1.25rem; color: #6c757d; text-decoration: none; font-weight: 600; }
        .nav-links { display: flex; list-style: none; margin: 0; padding: 0; gap: 15px; align-items: center; }
        .nav-links a { text-decoration: none; color: #6c757d; font-size: 0.95rem; }
        .nav-links a.active { color: #000000; font-weight: bold; }
        .nav-links a.home { color: #0d6efd; }
        .search-form { display: flex; gap: 8px; }
        .search-input { padding: 4px 8px; border: 1px solid #ced4da; border-radius: 4px; font-size: 0.875rem; width: 200px; }
        .search-btn { padding: 4px 12px; border: 1px solid #198754; background: transparent; color: #198754; border-radius: 4px; cursor: pointer; font-size: 0.875rem; }

        .main-container { background: #ffffff; margin: 40px auto; padding: 40px; max-width: 1100px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,.05); min-height: 70vh; }
        .btn-blue { background-color: #0d6efd; color: #ffffff !important; text-decoration: none; padding: 6px 12px; border-radius: 4px; font-weight: bold; font-size: 0.85rem; border: none; cursor: pointer; display: inline-block; }
        .btn-blue:hover { background-color: #0b5ed7; }
        .sort-block { margin: 20px 0 10px 0; font-size: 0.85rem; color: #6c757d; }
        .sort-block a { text-decoration: none; color: #0d6efd; margin-right: 10px; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.95rem; }
        th { border-bottom: 2px solid #212529; color: #212529; padding: 12px 8px; text-align: left; font-weight: bold; }
        td { padding: 12px 8px; border-bottom: 1px solid #dee2e6; color: #6c757d; }
        tr:hover td { background-color: #f8f9fa; }
        .text-dark-main { color: #212529; }
        .text-center { text-align: center; }

        .pagination-block { display: flex; justify-content: center; gap: 5px; margin-top: 30px; list-style: none; padding: 0; }
        .pagination-block a, .pagination-block b { padding: 6px 12px; border: 1px solid #dee2e6; text-decoration: none; color: #0d6efd; font-size: 0.875rem; border-radius: 4px; }
        .pagination-block b { background-color: #0d6efd; color: #ffffff; border-color: #0d6efd; }
    </style>
</head>
<body>

<!-- 1. Навигационная панель -->
<div class="navbar">
    <a class="navbar-brand" href="#">Library Management System</a>
    <ul class="nav-links">
        <li><a class="home" th:href="@{/}">Home</a></li>
        <li><a th:href="@{/categories}">Categories</a></li>
        <li><a class="active" th:href="@{/books}">Books</a></li>
        <li><a th:href="@{/publishers}">Publishers</a></li>
        <li><a th:href="@{/authors}">Authors</a></li>
    </ul>
    <form class="search-form" th:action="@{/books/search}" method="GET">
        <input class="search-input" type="search" placeholder="For the future development" name="query">
        <button class="search-btn" type="submit">Search</button>
    </form>
</div>

<!-- 2. Контентная область -->
<div class="main-container">

    <!-- Кнопка создания -->
    <div>
        <a th:href="@{/books/add-book}" class="btn-blue">+ Add Book</a>
    </div>

    <!-- Переключатели сортировки -->
    <div class="sort-block">
        Сортировать по:
        <a th:href="@{/books(page=${currentPage}, books_per_page=${booksPerPage}, sort_by='name', order=${sortBy == 'name' and order == 'asc' ? 'desc' : 'asc'})}">
            Названию <span th:if="${sortBy == 'name'}" th:text="${order == 'asc' ? '↑' : '↓'}"></span>
        </a>
        <a th:href="@{/books(page=${currentPage}, books_per_page=${booksPerPage}, sort_by='isbn', order=${sortBy == 'isbn' and order == 'asc' ? 'desc' : 'asc'})}">
            ISBN <span th:if="${sortBy == 'isbn'}" th:text="${order == 'asc' ? '↑' : '↓'}"></span>
        </a>
    </div>

    <!-- 3. Таблица данных -->
    <table>
        <thead>
        <tr>
            <th style="width: 5%">#</th>
            <th style="width: 25%">Book name</th>
            <th style="width: 15%">ISBN</th>
            <th style="width: 20%">Authors</th>
            <th style="width: 23%">Description</th>
            <th style="width: 6%" class="text-center">Edit</th>
            <th style="width: 6%" class="text-center">Delete</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="book, iterStat : ${books}">
            <td th:text="${iterStat.count + (currentPage * booksPerPage)}">1</td>
            <td class="text-dark-main" th:text="${book.name}">Book Name</td>
            <td th:text="${book.isbn}">ISBN-123</td>
            <td>
                        <span th:each="author, status : ${book.authors}">
                            <span th:text="${author.name}">Author</span><th:block th:if="${!status.last}">, </th:block>
                        </span>
            </td>
            <td th:text="${book.description}">Description text</td>

            <!-- Изменение: Текстовые аккуратные кнопки вместо чистых иконок -->
            <td class="text-center">
                <a th:href="@{/books/update-book/{id}(id=${book.id})}" class="btn-blue" style="padding: 3px 8px; font-size: 0.75rem;">Edit</a>
            </td>
            <td class="text-center">
                <a th:href="@{/books/remove-book/{id}(id=${book.id})}"
                   class="btn-blue"
                   style="padding: 3px 8px; font-size: 0.75rem; background-color: #dc3545;"
                   onclick="return confirm('Вы уверены?')">Del</a>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- 4. Пагинация в стиле макета -->
    <div class="pagination-block" th:if="${totalPages > 1}">
        <a th:if="${currentPage > 0}" th:href="@{/books(page=${currentPage - 1}, books_per_page=${booksPerPage}, sort_by=${sortBy}, order=${order})}">Назад</a>

        <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}" style="display: inline-block; margin: 0 2px;">
                <a th:if="${currentPage != i}" th:href="@{/books(page=${i}, books_per_page=${booksPerPage}, sort_by=${sortBy}, order=${order})}" th:text="${i + 1}">1</a>
                <b th:if="${currentPage == i}" th:text="${i + 1}">1</b>
            </span>

        <a th:if="${currentPage < totalPages - 1}" th:href="@{/books(page=${currentPage + 1}, books_per_page=${booksPerPage}, sort_by=${sortBy}, order=${order})}">Вперед</a>
    </div>

</div>

</body>
</html>
