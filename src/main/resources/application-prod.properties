# Production Database Configuration
spring.datasource.url=jdbc:mysql://production-db-server:3306/library_prod?useSSL=true
spring.datasource.username=prod_victor
spring.datasource.password=some_prod_pwd
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Properties
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate

# Server Port - changed from 443 to avoid requiring root permissions. Use Nginx to proxy 443 -> 8080.
server.port=8080

# Restrict production to only show minimal health and info metrics
management.endpoints.web.exposure.include=health,info
# Hide database paths and detailed error traces from public view
management.endpoint.health.show-details=never

app.errors.show-details=false

# Tells our Java Initializer bean to pass "prod" to Liquibase
spring.liquibase.enabled=true

# Standard Liquibase Integration
spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.yaml
spring.liquibase.contexts=prod